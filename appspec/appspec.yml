version: 0.0
os: linux
files:
  - source: deploy-app.zip  # 빌드된 애플리케이션 파일들이 있는 디렉터리
    destination: /home/ubuntu/app/  # 배포할 디렉터리


hooks:
  BeforeInstall:
    - location: deploy.sh  # 배포 전 실행할 스크립트
      timeout: 30
      owner: ubuntu
      group: ubuntu
      runas: ubuntu

  AfterInstall:
    - location: deploy.sh  # 배포 후 실행할 스크립트
      timeout: 30
      owner: ubuntu
      group: ubuntu
      runas: ubuntu

  ApplicationStart:
    - location: deploy.sh  # 애플리케이션 시작 시 실행할 스크립트
      timeout: 30
      owner: ubuntu
      group: ubuntu
      runas: ubuntu  